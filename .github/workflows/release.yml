name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/libs/Rerollager-*.jar
          name: Rerollager ${{ steps.ver.outputs.version }}
          version: ${{ steps.ver.outputs.version }}
          version-type: release
          loaders: |
            paper
            purpur
          game-versions: |
            26.2
          java: |
            25

          # Modrinth: create the project once (slug "rerollager") and add a
          # MODRINTH_TOKEN repo secret. Skipped automatically if the token is absent.
          modrinth-id: rerollager
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # Also creates/updates the GitHub release for the tag and attaches the jar.
          github-token: ${{ secrets.GITHUB_TOKEN }}
